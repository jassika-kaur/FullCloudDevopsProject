# ─── MongoDB Deployment ───────────────────────────────────────────
# This runs MongoDB inside Kubernetes

apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
        - name: mongo
          image: mongo:6.0
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
      volumes:
        - name: mongo-data
          emptyDir: {}   # Data stored in pod (use PersistentVolume in production)

---
# ─── MongoDB Service ──────────────────────────────────────────────
# This lets other pods (backend) connect to MongoDB
apiVersion: v1
kind: Service
metadata:
  name: mongo-service
spec:
  selector:
    app: mongo
  ports:
    - port: 27017
      targetPort: 27017
  type: ClusterIP   # Only accessible inside the cluster
